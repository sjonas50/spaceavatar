name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  agent:
    name: Agent (lint, tests, dry-run)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: agent/uv.lock
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest
      - name: Pipeline dry-run (offline wiring check)
        run: uv run python -m commander_sky.main dry-run

  web:
    name: Web (lint, build, e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      # match the npm major that generated the lockfile (npm 10 resolves the
      # sharp/wasm optional-dependency chain differently and rejects the lock)
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
