name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  agent:
    name: Agent (lint, tests, dry-run)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: agent/uv.lock
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest
      - name: Pipeline dry-run (offline wiring check)
        run: uv run python -m commander_sky.main dry-run

  web:
    name: Web (lint, build, e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      # npm install, not npm ci: the sharp/wasm optional-dependency chain
      # resolves differently per-OS, and a mac-generated lockfile fails npm
      # ci's strict check on linux (long-standing npm issue). install still
      # honors the lockfile for everything resolvable.
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
