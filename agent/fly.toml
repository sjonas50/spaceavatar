# Fly.io config for the Commander Sky agent worker.
# Lives in agent/ so the Fly build context matches the Dockerfile's COPY paths.
# Region must match the LiveKit Cloud project region (saves 50-100ms per turn).
#
# Deploy (from the agent/ directory):
#   fly launch --no-deploy        # first time: creates the app
#   fly secrets set LIVEKIT_URL=... LIVEKIT_API_KEY=... LIVEKIT_API_SECRET=... \
#     ANTHROPIC_API_KEY=... DEEPGRAM_API_KEY=... CARTESIA_API_KEY=... \
#     LEMONSLICE_API_KEY=... LEMONSLICE_AGENT_ID=...
#   fly deploy
# Secrets are never in this file.

app = "commander-sky-agent"
primary_region = "sjc" # matches LiveKit "US West B"; verify with your project

[build]
  dockerfile = "Dockerfile"

[env]
  AVATAR_MODE = "lemonslice"
  MAX_SESSION_MINUTES = "15"
  MAX_SESSION_COST_USD = "5.0"

# Workers hold live WebRTC sessions: never autostop mid-conversation,
# keep at least one warm worker (avoids LiveKit Build-plan cold starts).
[[vm]]
  # shared-cpu keeps this on Fly's hobby tier; move to performance-1x for
  # higher concurrency once the org plan allows it.
  size = "shared-cpu-2x"
  memory = "2gb"

[http_service]
  internal_port = 8081 # livekit-agents health check port
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
