# Fly.io config for the Commander Sky agent worker.
# Region must match the LiveKit Cloud project region (saves 50-100ms per turn).
# Deploy: fly deploy --config infra/fly.toml --dockerfile agent/Dockerfile
# Secrets: fly secrets set LIVEKIT_URL=... LIVEKIT_API_KEY=... (never in this file)

app = "commander-sky-agent"
primary_region = "iad" # match LiveKit Cloud region before first deploy

[build]
  dockerfile = "../agent/Dockerfile"

[env]
  AVATAR_MODE = "lemonslice"
  MAX_SESSION_MINUTES = "15"

# Workers hold live WebRTC sessions: never autostop mid-conversation,
# keep at least one warm worker (LiveKit Build-plan cold starts are 10-20s).
[[vm]]
  size = "performance-1x"
  memory = "2gb"

[http_service]
  internal_port = 8081 # livekit-agents health check port
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
